name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: "clippy,rustfmt"
      - name: Check formatting (rustfmt)
        shell: bash
        run: |
          cargo fmt --check
      - name: clippy
        shell: bash
        run: |
          cargo clippy

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Install packages
        shell: bash
        run: |
          sudo apt-get install -y binutils gcc clang lld
      - name: Check out repo
        uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Wasmer
        uses: wasmerio/setup-wasmer@v2
        with:
          version: "v7.1.0"
      - name: test
        shell: bash
        run: cargo test --all-features -j1
      - name: build
        shell: bash
        run: |
          cargo build --release
